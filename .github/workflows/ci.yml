name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (postgres ${{ matrix.postgres }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: ["14", "16"]

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_PASSWORD: pw
          POSTGRES_DB: pigration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://postgres:pw@localhost:5432/pigration_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needs to be run on:" && echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go vet (example)
        run: go vet -C examples/todo-app ./...

      - name: go build
        run: go build ./...

      # -p 1 serializes package test binaries: the migrator and CLI e2e tests
      # DROP SCHEMA public on the shared database, so packages must not overlap.
      - name: go test (race, coverage, live Postgres)
        run: go test -p 1 -count=1 -race -coverprofile=cover.out ./...

      - name: coverage floor (95%)
        run: |
          total=$(go tool cover -func=cover.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t + 0 < 95) ? 1 : 0 }' || {
            echo "coverage ${total}% is below the 95% floor"; exit 1;
          }

      - name: example todo-app tests
        run: go test -C examples/todo-app -p 1 -count=1 -race ./...
